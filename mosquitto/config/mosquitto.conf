# ============================================
# Eclipse Mosquitto — Development Configuration
# ============================================

# Network listeners
listener 1883
protocol mqtt

listener 9001
protocol websockets

# Authentication (open for dev — lock down in production)
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
log_timestamp true
